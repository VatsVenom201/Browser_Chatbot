<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div id="controls">
        <button id="analyze-btn">Analyze Page</button>
        <button id="summarize-page-btn">Summarize Page</button>
        <button id="summarize-selected-btn">Summarize Selected</button>
    </div>
    <div id="chat-container">
        <div id="chat-box"></div>
        <div id="loading" class="hidden">Thinking...</div>
    </div>
    <div id="input-container">
        <textarea id="user-input" placeholder="Ask a question..." rows="2"></textarea>
        <button id="send-btn">Send</button>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
